spring:
  application:
    name: auth-service

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:pesa_lending}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: 8081
  servlet:
    context-path: /api/auth

logging:
  level:
    root: INFO
    com.pesa: DEBUG
  pattern:
    console: "[%d{yyyy-MM-dd HH:mm:ss}] [%thread] %-5level %logger{36} - %msg%n"

jwt:
  secret: ${JWT_SECRET:your-secret-key-change-in-production}
  expiration: 86400000

app:
  name: Pesa Lending Auth Service
  version: 1.0.0

# External service integrations (placeholders)
bulk-sms:
  api-key: ${BULK_SMS_API_KEY:}
  api-url: https://api.bulksms.com/v1

nida:
  api-key: ${NIDA_API_KEY:}
  api-url: https://api.nida.go.tz

file-storage:
  type: ${FILE_STORAGE_TYPE:local}
  local-path: /tmp/pesa-documents
  s3-bucket: ${AWS_S3_BUCKET:}
